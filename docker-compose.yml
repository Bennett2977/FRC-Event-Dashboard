services:
  dashboard:
    build: .
    env_file: .env
    environment:
      - TBA_API_KEY=${TBA_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - analytics

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    volumes:
      - analytics-data:/data
    restart: unless-stopped

volumes:
  analytics-data:
