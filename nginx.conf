server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver; re-resolve every 30 s so nginx
    # doesn't cache a failed lookup if the analytics container starts late.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Proxy analytics API to the analytics sidecar service.
    # The variable forces nginx to resolve the hostname dynamically
    # rather than once at startup (which fails if analytics isn't up yet).
    location /analytics/ {
        set $analytics_upstream http://analytics:3001;
        proxy_pass          $analytics_upstream/;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Host              $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
